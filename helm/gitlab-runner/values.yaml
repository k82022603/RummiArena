# helm/gitlab-runner/values.yaml
# GitLab Runner — Kubernetes Executor (chart v0.87.0)
# 네임스페이스: cicd
# 참조: https://docs.gitlab.com/runner/install/kubernetes.html
#
# 설치 명령 (실제 토큰 설정 후):
#   helm install gitlab-runner gitlab/gitlab-runner \
#     -n cicd --create-namespace \
#     -f helm/gitlab-runner/values.yaml \
#     --set runnerToken="<실제 Runner 토큰>"
#
# Runner 토큰 발급:
#   GitLab.com → 프로젝트 → Settings → CI/CD → Runners → New project runner
#   또는 glab API: glab api --method POST user/runners \
#     -f runner_type=project_type -f project_id=<ID> \
#     -f tag_list="k8s,rummiarena" -f run_untagged=false -f locked=true
#
# dry-run 검증:
#   helm install gitlab-runner gitlab/gitlab-runner \
#     -n cicd -f helm/gitlab-runner/values.yaml --dry-run 2>&1 | head -80

# ---------------------------------------------------------------------------
# 글로벌 설정
# ---------------------------------------------------------------------------

# GitLab 인스턴스 URL
gitlabUrl: https://gitlab.com

# Runner 등록 토큰 (실제 값은 --set으로 주입, 여기에 커밋 금지)
runnerToken: ""

# 동시 실행 Job 수 (10GB RAM 제약 — 보수적 설정)
concurrent: 2

# Job 폴링 간격 (초)
checkInterval: 15

# 로그 레벨
logLevel: info

# Runner 이름
nameOverride: "rummiarena-runner"

# Unregister on terminate (Pod 삭제 시 GitLab에서 Runner 등록 해제)
unregisterRunners: true

# ---------------------------------------------------------------------------
# Runner 설정 (config.toml 생성)
# 모든 Executor/리소스/이미지 설정은 runners.config TOML 블록에서 정의
# ref: https://docs.gitlab.com/runner/configuration/advanced-configuration.html
# ---------------------------------------------------------------------------
runners:
  config: |
    [[runners]]
      executor = "kubernetes"
      limit = 2
      [runners.kubernetes]
        namespace = "cicd"
        image = "alpine:3.19"
        privileged = false
        pull_policy = ["if-not-present", "always"]
        # Job Pod 리소스 제한 (10GB WSL 제약)
        cpu_request = "100m"
        cpu_limit = "500m"
        memory_request = "128Mi"
        memory_limit = "512Mi"
        # Service 컨테이너 리소스
        service_cpu_request = "100m"
        service_cpu_limit = "300m"
        service_memory_request = "64Mi"
        service_memory_limit = "256Mi"
        # Helper 컨테이너 리소스
        helper_cpu_request = "50m"
        helper_cpu_limit = "200m"
        helper_memory_request = "64Mi"
        helper_memory_limit = "128Mi"
        [runners.kubernetes.pod_labels]
          "app" = "gitlab-runner-job"
          "project" = "rummiarena"
          "app.kubernetes.io/managed-by" = "gitlab-runner"

  # 캐시 비활성화 (로컬 개발 환경)
  cache: {}

# ---------------------------------------------------------------------------
# Runner Pod 자체 리소스 (Runner 컨트롤러 Pod)
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

# ---------------------------------------------------------------------------
# Runner Pod 보안 컨텍스트
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsUser: 100
  fsGroup: 65533

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true

# ---------------------------------------------------------------------------
# 서비스 어카운트 + RBAC
# Job Pod가 cicd 네임스페이스에서 Pod 생성 권한을 가져야 함
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: gitlab-runner

rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "pods/exec", "pods/attach", "secrets", "configmaps"]
      verbs: ["get", "list", "watch", "create", "patch", "delete"]
    - apiGroups: [""]
      resources: ["pods/log"]
      verbs: ["get", "list", "watch"]

# ---------------------------------------------------------------------------
# 환경 변수 (Runner Pod에 적용, map 형식)
# ---------------------------------------------------------------------------
extraEnv:
  KUBERNETES_VERIFY_TLS: "false"

# ---------------------------------------------------------------------------
# 추가 볼륨 (Docker 소켓 불필요 — K8s Executor 사용)
# ---------------------------------------------------------------------------
extraVolumes: []
extraVolumeMounts: []
