# helm/environments/dev-values.yaml
# 개발(Dev) 환경 오버라이드
# Sprint 1부터 서비스별 이미지 태그를 여기서 관리
# ArgoCD가 이 파일을 감시하여 자동 배포

global:
  environment: dev
  imageTag: latest
  imagePullPolicy: IfNotPresent

# game-server 이미지 오버라이드 (update-gitops CI job이 tag를 업데이트)
gameServer:
  replicas: 1
  image:
    repository: registry.gitlab.com/k82022603/rummiarena/game-server
    tag: latest
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    LOG_LEVEL: debug
    AI_ADAPTER_URL: "http://ai-adapter:8081"

# ai-adapter 이미지 오버라이드
aiAdapter:
  replicas: 1
  image:
    repository: registry.gitlab.com/k82022603/rummiarena/ai-adapter
    tag: latest
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# frontend 이미지 오버라이드
frontend:
  replicas: 1
  image:
    repository: registry.gitlab.com/k82022603/rummiarena/frontend
    tag: latest
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

# admin 이미지 오버라이드 (Sprint 2 신규)
admin:
  replicas: 1
  image:
    repository: registry.gitlab.com/k82022603/rummiarena/admin
    tag: latest
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
