# helm/environments/dev-values.yaml
# 개발(Dev) 환경 오버라이드
# Sprint 1부터 서비스별 이미지 태그를 여기서 관리
# ArgoCD가 이 파일을 감시하여 자동 배포

global:
  environment: dev
  imageTag: latest
  imagePullPolicy: IfNotPresent

