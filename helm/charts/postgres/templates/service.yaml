---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app: postgres
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: postgres
  ports:
    - name: postgres
      port: {{ .Values.service.port }}
      targetPort: 5432
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
