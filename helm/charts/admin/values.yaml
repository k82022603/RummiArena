replicaCount: 1

image:
  repository: rummiarena/admin
  tag: dev
  pullPolicy: Never

service:
  type: NodePort
  port: 3001
  nodePort: 30001

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

env:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "http://localhost:30080/api"
  NEXTAUTH_SECRET: "dev-nextauth-secret-for-k8s"
  NEXTAUTH_URL: "http://localhost:30001"

livenessProbe:
  path: /
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  path: /
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
