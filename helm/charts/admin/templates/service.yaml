---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: admin
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: admin
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 3001
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
