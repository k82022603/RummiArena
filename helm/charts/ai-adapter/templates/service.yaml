---
apiVersion: v1
kind: Service
metadata:
  name: ai-adapter
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: ai-adapter
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: ai-adapter
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8081
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
