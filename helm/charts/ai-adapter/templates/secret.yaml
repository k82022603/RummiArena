---
apiVersion: v1
kind: Secret
metadata:
  name: ai-adapter-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: ai-adapter
    release: {{ .Release.Name }}
type: Opaque
data:
  OPENAI_API_KEY: {{ .Values.secrets.OPENAI_API_KEY | b64enc | quote }}
  CLAUDE_API_KEY: {{ .Values.secrets.CLAUDE_API_KEY | b64enc | quote }}
  DEEPSEEK_API_KEY: {{ .Values.secrets.DEEPSEEK_API_KEY | b64enc | quote }}
