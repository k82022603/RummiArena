replicaCount: 1

image:
  repository: rummiarena/ai-adapter
  tag: dev
  pullPolicy: Never

service:
  type: NodePort
  port: 8081
  nodePort: 30081

env:
  # 참고: AI_ADAPTER_TIMEOUT_SEC 는 ai-adapter 가 소비하지 않음. game-server 가 req.timeoutMs 로 주입함 (docs/02-design/41 §8 위반 2)
  NODE_ENV: "production"
  PORT: "8081"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_DEFAULT_MODEL: "qwen2.5:3b"
  OPENAI_DEFAULT_MODEL: "gpt-5-mini"
  CLAUDE_DEFAULT_MODEL: "claude-sonnet-4-20250514"
  CLAUDE_EXTENDED_THINKING: "true"
  DEEPSEEK_DEFAULT_MODEL: "deepseek-v4-pro"
  # V4-Pro thinking 채택 (2026-04-28, place 31.9%, fallback 0)
  # true: thinking: { type: "enabled" } + reasoning_effort: "high"
  DEEPSEEK_V4_THINKING_MODE: "true"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  DAILY_COST_LIMIT_USD: "20"
  HOURLY_USER_COST_LIMIT_USD: "5"
  # PromptRegistry (SP3 / docs/02-design/39 §6.5) — 빈 값 = default-recommendation
  # 운영 기준: docs/02-design/42-prompt-variant-standard.md §2 표 B (SSOT)
  # PROMPT_VARIANT="v3" 1줄로 5개 모델 전부 v3 전환 가능.
  # v2-zh: DeepSeek Reasoner 전용 중문 variant. Day 7 A/B 실험용.
  # 활성화: kubectl -n rummikub set env deployment/ai-adapter DEEPSEEK_REASONER_PROMPT_VARIANT=v2-zh
  # v7-ollama-meld: Ollama(qwen2.5:3b) 전용 하드코딩 프롬프트 (Sprint 7 hotfix, 2026-04-22)
  # 활성화: kubectl -n rummikub set env deployment/ai-adapter OLLAMA_PROMPT_VARIANT=v7-ollama-meld
  PROMPT_VARIANT: ""
  OPENAI_PROMPT_VARIANT: ""
  CLAUDE_PROMPT_VARIANT: "v4"
  DEEPSEEK_PROMPT_VARIANT: ""
  DEEPSEEK_REASONER_PROMPT_VARIANT: "v2"
  DASHSCOPE_PROMPT_VARIANT: "v4"
  OLLAMA_PROMPT_VARIANT: "v7-ollama-meld"
  # ContextShaper 설정 (docs/02-design/44 §6.3)
  # 기본값 passthrough = v2 동작 그대로 보존
  # Phase 4 실측: kubectl set env deploy/ai-adapter -n rummikub DEEPSEEK_REASONER_CONTEXT_SHAPER=joker-hinter
  # Phase 5 실측: kubectl set env deploy/ai-adapter -n rummikub DEEPSEEK_REASONER_CONTEXT_SHAPER=pair-warmup
  DEEPSEEK_REASONER_CONTEXT_SHAPER: "passthrough"
  DEFAULT_CONTEXT_SHAPER: "passthrough"

secrets:
  # 실제 값은 kubectl patch 또는 inject-secrets.sh로 주입 (Git에 커밋하지 말 것)
  OPENAI_API_KEY: ""
  CLAUDE_API_KEY: ""
  DEEPSEEK_API_KEY: ""

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

livenessProbe:
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Istio sidecar injection (Phase 5)
# istio-values.yaml로 오버라이드하거나 직접 true로 변경
istio:
  enabled: false
  sidecar:
    proxyCPU: "50m"
    proxyCPULimit: "200m"
    proxyMemory: "64Mi"
    proxyMemoryLimit: "128Mi"
