replicaCount: 1

image:
  repository: rummiarena/ai-adapter
  tag: dev
  pullPolicy: Never

service:
  type: NodePort
  port: 8081
  nodePort: 30081

env:
  NODE_ENV: "production"
  PORT: "8081"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_DEFAULT_MODEL: "qwen2.5:3b"
  OPENAI_DEFAULT_MODEL: "gpt-5-mini"
  CLAUDE_DEFAULT_MODEL: "claude-sonnet-4-20250514"
  CLAUDE_EXTENDED_THINKING: "true"
  DEEPSEEK_DEFAULT_MODEL: "deepseek-reasoner"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  DAILY_COST_LIMIT_USD: "20"
  HOURLY_USER_COST_LIMIT_USD: "5"

secrets:
  # 실제 값은 kubectl patch 또는 inject-secrets.sh로 주입 (Git에 커밋하지 말 것)
  OPENAI_API_KEY: ""
  CLAUDE_API_KEY: ""
  DEEPSEEK_API_KEY: ""

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

livenessProbe:
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
