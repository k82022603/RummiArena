replicaCount: 1

image:
  repository: rummiarena/ai-adapter
  tag: dev
  pullPolicy: Never

service:
  type: NodePort
  port: 8081
  nodePort: 30081

env:
  NODE_ENV: "production"
  PORT: "8081"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_DEFAULT_MODEL: "qwen2.5:3b"
  OPENAI_DEFAULT_MODEL: "gpt-5-mini"
  CLAUDE_DEFAULT_MODEL: "claude-sonnet-4-20250514"
  CLAUDE_EXTENDED_THINKING: "true"
  DEEPSEEK_DEFAULT_MODEL: "deepseek-reasoner"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  DAILY_COST_LIMIT_USD: "20"
  HOURLY_USER_COST_LIMIT_USD: "5"
  # PromptRegistry (SP3 / docs/02-design/39 §6.5) — 빈 값 = default-recommendation
  # PROMPT_VARIANT="v3" 1줄로 5개 모델 전부 v3 전환 가능.
  PROMPT_VARIANT: ""
  OPENAI_PROMPT_VARIANT: ""
  CLAUDE_PROMPT_VARIANT: ""
  DEEPSEEK_PROMPT_VARIANT: ""
  DEEPSEEK_REASONER_PROMPT_VARIANT: ""
  DASHSCOPE_PROMPT_VARIANT: ""
  OLLAMA_PROMPT_VARIANT: ""

secrets:
  # 실제 값은 kubectl patch 또는 inject-secrets.sh로 주입 (Git에 커밋하지 말 것)
  OPENAI_API_KEY: ""
  CLAUDE_API_KEY: ""
  DEEPSEEK_API_KEY: ""

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

livenessProbe:
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Istio sidecar injection (Phase 5)
# istio-values.yaml로 오버라이드하거나 직접 true로 변경
istio:
  enabled: false
  sidecar:
    proxyCPU: "50m"
    proxyCPULimit: "200m"
    proxyMemory: "64Mi"
    proxyMemoryLimit: "128Mi"
