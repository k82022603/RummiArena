replicaCount: 1

image:
  repository: redis
  tag: "7-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 6379

maxmemory: "128mb"
maxmemoryPolicy: "allkeys-lru"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "192Mi"
    cpu: "200m"

livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
