---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app: redis
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: redis
  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: 6379
