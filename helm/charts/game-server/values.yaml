replicaCount: 1

image:
  repository: rummiarena/game-server
  tag: dev
  pullPolicy: Never

service:
  type: NodePort
  port: 8080
  nodePort: 30080

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "300m"

env:
  SERVER_PORT: "8080"
  SERVER_MODE: "debug"
  DB_HOST: "postgres.rummikub.svc.cluster.local"
  DB_PORT: "5432"
  DB_USER: "rummikub"
  DB_NAME: "rummikub"
  REDIS_HOST: "redis.rummikub.svc.cluster.local"
  REDIS_PORT: "6379"

secrets:
  # 실제 값은 kubectl patch 또는 외부 Secret으로 주입 (Git에 커밋하지 말 것)
  DB_PASSWORD: ""
  JWT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""

livenessProbe:
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  path: /ready
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

initContainers:
  waitForPostgres:
    enabled: true
  waitForRedis:
    enabled: true
