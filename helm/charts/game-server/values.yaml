replicaCount: 1

image:
  repository: rummiarena/game-server
  tag: dev
  pullPolicy: Never

service:
  type: NodePort
  port: 8080
  nodePort: 30080

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "300m"

env:
  SERVER_PORT: "8080"
  SERVER_MODE: "debug"
  APP_ENV: "dev"
  DB_HOST: "postgres.rummikub.svc.cluster.local"
  DB_PORT: "5432"
  DB_USER: "rummikub"
  DB_NAME: "rummikub"
  REDIS_HOST: "redis.rummikub.svc.cluster.local"
  REDIS_PORT: "6379"
  CORS_ALLOWED_ORIGINS: "http://localhost:30000,http://localhost:3000"
  AI_ADAPTER_URL: "http://ai-adapter:8081"
  AI_ADAPTER_TIMEOUT_SEC: "700"
  RATE_LIMIT_LOW_MAX: "1000"
  # Playwright E2E suite(--repeat-each=7, spec당 최대 20 createRoomAndStart)가
  # 단일 게스트 세션을 공유하므로 1분 윈도우에 다수 WS 업그레이드가 집중된다.
  # 프로덕션 기본값(5)은 운영 values override에서 다시 낮춰야 한다. (docs/04-testing/51)
  RATE_LIMIT_WS_MAX: "300"
  AI_COOLDOWN_SEC: "0"
  # BUG-GS-005 후속: 게임 턴 상한. 초과 시 STALEMATE로 귀결되며 Redis GameState 자동 정리.
  # 0 이하면 제한 없음. 기본 200턴 (정상 플레이 여유분, 설계 문서 32 §8.1)
  GAME_MAX_TURNS_LIMIT: "200"

secrets:
  # 실제 값은 kubectl patch 또는 외부 Secret으로 주입 (Git에 커밋하지 말 것)
  DB_PASSWORD: ""
  JWT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""

livenessProbe:
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  path: /ready
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

initContainers:
  waitForPostgres:
    enabled: true
  waitForRedis:
    enabled: true

# Istio sidecar injection (Phase 5)
# istio-values.yaml로 오버라이드하거나 직접 true로 변경
istio:
  enabled: false
  sidecar:
    proxyCPU: "50m"
    proxyCPULimit: "200m"
    proxyMemory: "64Mi"
    proxyMemoryLimit: "128Mi"
