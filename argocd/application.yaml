---
# ArgoCD Application -- RummiArena GitOps 설정
# Git 소스: https://github.com/k82022603/RummiArena.git
# 대상: rummikub namespace
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rummikub
  namespace: argocd
  labels:
    app.kubernetes.io/name: rummikub
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/k82022603/RummiArena.git
    targetRevision: main
    # helm/ 디렉토리의 Umbrella Chart를 감시
    path: helm
    helm:
      valueFiles:
        - environments/dev-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: rummikub
  syncPolicy:
    automated:
      prune: true       # Git에서 삭제된 리소스는 K8s에서도 삭제
      selfHeal: true    # 수동 변경 감지 시 자동 복구
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
