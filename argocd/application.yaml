---
# ArgoCD Application -- RummiArena GitOps 설정
# Git 소스: https://github.com/k82022603/RummiArena.git
# 대상: rummikub namespace
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rummikub
  namespace: argocd
  labels:
    app.kubernetes.io/name: rummikub
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/k82022603/RummiArena.git
    targetRevision: main
    # helm/ 디렉토리의 Umbrella Chart를 감시
    path: helm
    helm:
      valueFiles:
        - environments/dev-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: rummikub
  # 민감 정보 필드는 Git에 저장하지 않고 kubectl로 직접 주입
  # ignoreDifferences: ArgoCD Drift 감지에서 제외 → selfHeal 덮어쓰기 방지
  ignoreDifferences:
    - kind: Secret
      name: game-server-secret
      namespace: rummikub
      jsonPointers:
        - /data/JWT_SECRET
        - /data/DB_PASSWORD
        - /data/GOOGLE_CLIENT_ID
        - /data/GOOGLE_CLIENT_SECRET
    - kind: Secret
      name: postgres-secret
      namespace: rummikub
      jsonPointers:
        - /data/POSTGRES_PASSWORD
    - kind: Secret
      name: frontend-secret
      namespace: rummikub
      jsonPointers:
        - /data/NEXTAUTH_SECRET
        - /data/GOOGLE_CLIENT_SECRET
  syncPolicy:
    automated:
      prune: true       # Git에서 삭제된 리소스는 K8s에서도 삭제
      selfHeal: true    # 수동 변경 감지 시 자동 복구
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
