id: rearrange-v13-type3
title: "V-13 Type 3 재배치 — 기존 런 분할 + 랙 타일 추가"
description: |
  BUG-UI-REARRANGE-002 (그룹 5회 중복 렌더링)가 재현된 경로다.
  런 4매 이상 + 경계 타일이 함께 있을 때 split + re-merge가 발생한다.
  확률적으로는 30턴 중 약 18%만 조건 충족 — 시드 고정 없이 회귀 불가.
