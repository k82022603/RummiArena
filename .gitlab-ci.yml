# .gitlab-ci.yml
# RummiArena GitLab CI/CD 파이프라인
# DevSecOps: lint → test → quality → build → update-gitops
#
# 교대 실행 전략 (10GB WSL 제약):
#   CI 모드: PG(Sonar) + SonarQube + GitLab Runner ~ 2.5 GB
#   Dev/Deploy 모드와 CI 모드 동시 실행 금지
#
# 필요한 GitLab CI/CD Variables (Settings → CI/CD → Variables):
#   SONAR_HOST_URL       — SonarQube 서버 URL (예: http://host.docker.internal:9001)
#   SONAR_TOKEN          — SonarQube 분석 토큰
#   CI_REGISTRY_USER     — GitLab Container Registry 사용자 (자동 제공)
#   CI_REGISTRY_PASSWORD — GitLab Container Registry 패스워드 (자동 제공)
#   GITOPS_TOKEN         — GitHub Personal Access Token (GitOps repo push용)

# =============================================================================
# 전역 설정
# =============================================================================

stages:
  - lint
  - test
  - quality
  - build
  - update-gitops

variables:
  DOCKER_IMAGE: registry.gitlab.com/k82022603/rummiarena
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""          # DinD TLS 비활성화 (로컬 러너)
  SONAR_PROJECT_KEY: rummiarena
  # Go 모듈 캐시 경로
  GOPATH: "$CI_PROJECT_DIR/.cache/go"
  # Node.js npm 캐시
  npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"
  # Trivy DB 캐시 (매 실행 DB 재다운로드 방지)
  TRIVY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/trivy"

# 로컬 K8s 런너 강제 실행 앵커
# quality/lint/test는 host.docker.internal 접근이 필요하므로 공유 런너 사용 금지
.local-runner: &local-runner
  tags:
    - k8s
    - rummiarena

# 공통 캐시 앵커 (YAML 앵커 재사용)
.go-cache: &go-cache
  key:
    files:
      - src/game-server/go.sum
  paths:
    - .cache/go/

.node-ai-cache: &node-ai-cache
  key:
    files:
      - src/ai-adapter/package-lock.json
  paths:
    - src/ai-adapter/node_modules/
    - .cache/npm/

.node-fe-cache: &node-fe-cache
  key:
    files:
      - src/frontend/package-lock.json
  paths:
    - src/frontend/node_modules/
    - .cache/npm/

.node-admin-cache: &node-admin-cache
  key:
    files:
      - src/admin/package-lock.json
  paths:
    - src/admin/node_modules/
    - .cache/npm/

# =============================================================================
# Lint Stage — 코드 스타일 및 정적 문법 검사
# =============================================================================

lint-go:
  stage: lint
  <<: *local-runner
  image: golangci/golangci-lint:v2.1
  cache:
    <<: *go-cache
    policy: pull-push
  script:
    - cd src/game-server
    - golangci-lint run ./... --timeout 10m
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  interruptible: true

lint-nest:
  stage: lint
  <<: *local-runner
  image: node:22-alpine
  cache:
    <<: *node-ai-cache
    policy: pull-push
  script:
    - cd src/ai-adapter
    - npm ci --prefer-offline
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  interruptible: true

lint-frontend:
  stage: lint
  <<: *local-runner
  image: node:22-alpine
  cache:
    <<: *node-fe-cache
    policy: pull-push
  script:
    - cd src/frontend
    - npm ci --prefer-offline
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  interruptible: true

lint-admin:
  stage: lint
  <<: *local-runner
  image: node:22-alpine
  cache:
    <<: *node-admin-cache
    policy: pull-push
  script:
    - cd src/admin
    - npm ci --prefer-offline
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  interruptible: true

# =============================================================================
# Test Stage — 단위/통합 테스트 + 커버리지 수집
# =============================================================================

test-go:
  stage: test
  <<: *local-runner
  image: golang:1.24-alpine
  cache:
    <<: *go-cache
    policy: pull
  before_script:
    - apk add --no-cache gcc musl-dev
  script:
    - cd src/game-server
    # 커버리지 프로파일 수집
    - go test ./... -v
        -coverprofile=coverage.out
        -covermode=atomic
        -timeout 120s
    - go tool cover -func=coverage.out
    # XML 변환 (GitLab Coverage 리포트) — 원본 module 경로로 gocover-cobertura 실행
    - GOBIN=/usr/local/bin go install github.com/boumenot/gocover-cobertura@latest
    - gocover-cobertura < coverage.out > coverage.xml
    # SonarQube용 경로 변환: module 경로 → 프로젝트 상대 경로 (별도 파일로 유지)
    - sed "s|github.com/k82022603/RummiArena/game-server/|src/game-server/|g" coverage.out > coverage_sonar.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: src/game-server/coverage.xml
    paths:
      - src/game-server/coverage.out
      - src/game-server/coverage_sonar.out
      - src/game-server/coverage.xml
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-nest:
  stage: test
  <<: *local-runner
  image: node:22-alpine
  cache:
    <<: *node-ai-cache
    policy: pull
  script:
    - cd src/ai-adapter
    - npm ci --prefer-offline
    # Jest 기본 reporters(json,text,lcov,clover)에 cobertura 추가 — GitLab Coverage 리포트용
    - npx jest --coverage --coverageReporters=text --coverageReporters=lcov --coverageReporters=cobertura
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: src/ai-adapter/coverage/cobertura-coverage.xml
    paths:
      - src/ai-adapter/coverage/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# =============================================================================
# Quality Stage — 보안 게이트 (DevSecOps)
# sonarqube + trivy-fs 는 병렬 실행
# =============================================================================

sonarqube:
  stage: quality
  <<: *local-runner
  image: sonarsource/sonar-scanner-cli:5.0
  variables:
    SONAR_HOST_URL: $SONAR_HOST_URL   # GitLab CI Variable로 주입
    SONAR_TOKEN: $SONAR_TOKEN         # GitLab CI Variable로 주입
    # SonarQube Scanner JVM 메모리 최소화 (CI 모드 10GB 제약)
    SONAR_SCANNER_OPTS: "-server -Xmx512m"
  script:
    - sonar-scanner
        -Dsonar.projectKey=$SONAR_PROJECT_KEY
        -Dsonar.projectName="RummiArena"
        -Dsonar.host.url=$SONAR_HOST_URL
        -Dsonar.token=$SONAR_TOKEN
        -Dsonar.qualitygate.wait=true
        -Dsonar.sources=src/
        -Dsonar.exclusions="**/node_modules/**,**/*.test.go,**/*.spec.ts,**/*.spec.js,**/dist/**,**/coverage/**,**/playwright-report/**,**/test-results/**,src/frontend/**,src/admin/**"
        -Dsonar.coverage.exclusions="src/frontend/**,src/admin/**"
        -Dsonar.go.coverage.reportPaths=src/game-server/coverage_sonar.out
        -Dsonar.javascript.lcov.reportPaths=src/ai-adapter/coverage/lcov.info
  needs:
    - test-go
    - test-nest
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

trivy-fs:
  stage: quality
  <<: *local-runner
  image:
    name: aquasec/trivy:0.58.2
    entrypoint: [""]
  cache:
    key: trivy-db-cache
    paths:
      - .cache/trivy/
    policy: pull-push
  variables:
    TRIVY_CACHE_DIR: ".cache/trivy"
  script:
    # 파일시스템 취약점 스캔 (HIGH/CRITICAL 발견 시 파이프라인 실패)
    - trivy fs
        --exit-code 1
        --severity HIGH,CRITICAL
        --no-progress
        --format table
        --cache-dir "$TRIVY_CACHE_DIR"
        --skip-dirs "src/ai-adapter/node_modules,src/frontend/node_modules,src/admin/node_modules,.cache"
        src/
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  interruptible: true

# =============================================================================
# Build Stage — Docker 멀티스테이지 빌드 + 이미지 스캔
# =============================================================================

.build-common: &build-common
  stage: build
  <<: *local-runner
  image: docker:26-cli
  services:
    - name: docker:26-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build-game-server:
  <<: *build-common
  script:
    - docker build
        --target runner
        --tag $DOCKER_IMAGE/game-server:$CI_COMMIT_SHA
        --tag $DOCKER_IMAGE/game-server:latest
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA"
        --label "org.opencontainers.image.ref.name=$CI_COMMIT_REF_NAME"
        --cache-from $DOCKER_IMAGE/game-server:latest
        src/game-server/
    - docker push $DOCKER_IMAGE/game-server:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE/game-server:latest
    # Trivy 이미지 스캔 (CRITICAL 발견 시 실패)
    - docker run --rm
        -v /var/run/docker.sock:/var/run/docker.sock
        aquasec/trivy:0.58.2 image
        --exit-code 1
        --severity CRITICAL
        --no-progress
        $DOCKER_IMAGE/game-server:$CI_COMMIT_SHA

build-ai-adapter:
  <<: *build-common
  script:
    - docker build
        --target runner
        --tag $DOCKER_IMAGE/ai-adapter:$CI_COMMIT_SHA
        --tag $DOCKER_IMAGE/ai-adapter:latest
        --cache-from $DOCKER_IMAGE/ai-adapter:latest
        src/ai-adapter/
    - docker push $DOCKER_IMAGE/ai-adapter:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE/ai-adapter:latest
    - docker run --rm
        -v /var/run/docker.sock:/var/run/docker.sock
        aquasec/trivy:0.58.2 image
        --exit-code 1
        --severity CRITICAL
        --no-progress
        $DOCKER_IMAGE/ai-adapter:$CI_COMMIT_SHA

build-frontend:
  <<: *build-common
  script:
    - docker build
        --target runner
        --tag $DOCKER_IMAGE/frontend:$CI_COMMIT_SHA
        --tag $DOCKER_IMAGE/frontend:latest
        --cache-from $DOCKER_IMAGE/frontend:latest
        src/frontend/
    - docker push $DOCKER_IMAGE/frontend:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE/frontend:latest
    - docker run --rm
        -v /var/run/docker.sock:/var/run/docker.sock
        aquasec/trivy:0.58.2 image
        --exit-code 1
        --severity CRITICAL
        --no-progress
        $DOCKER_IMAGE/frontend:$CI_COMMIT_SHA

build-admin:
  <<: *build-common
  script:
    - docker build
        --target runner
        --tag $DOCKER_IMAGE/admin:$CI_COMMIT_SHA
        --tag $DOCKER_IMAGE/admin:latest
        --cache-from $DOCKER_IMAGE/admin:latest
        src/admin/
    - docker push $DOCKER_IMAGE/admin:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE/admin:latest
    - docker run --rm
        -v /var/run/docker.sock:/var/run/docker.sock
        aquasec/trivy:0.58.2 image
        --exit-code 1
        --severity CRITICAL
        --no-progress
        $DOCKER_IMAGE/admin:$CI_COMMIT_SHA

# =============================================================================
# Update GitOps Stage — ArgoCD가 감시하는 dev-values.yaml 이미지 태그 업데이트
# =============================================================================

update-gitops:
  stage: update-gitops
  <<: *local-runner
  image:
    name: alpine/git:latest
    entrypoint: [""]
  before_script:
    - git config --global user.email "ci@rummiarena.local"
    - git config --global user.name "GitLab CI Bot"
  script:
    - git clone https://oauth2:$GITOPS_TOKEN@github.com/k82022603/RummiArena.git gitops
    - cd gitops
    # dev-values.yaml 구조: repository + tag 분리 (Helm 표준)
    # repository를 GitLab Registry 경로로 교체하고 tag를 커밋 SHA로 업데이트
    # gameServer 섹션
    - 'sed -i "/gameServer:/,/aiAdapter:/{s|repository:.*|repository: $DOCKER_IMAGE/game-server|;s|tag:.*|tag: \"$CI_COMMIT_SHA\"|}" helm/environments/dev-values.yaml'
    # aiAdapter 섹션
    - 'sed -i "/aiAdapter:/,/frontend:/{s|repository:.*|repository: $DOCKER_IMAGE/ai-adapter|;s|tag:.*|tag: \"$CI_COMMIT_SHA\"|}" helm/environments/dev-values.yaml'
    # frontend 섹션
    - 'sed -i "/^frontend:/,/^admin:/{s|repository:.*|repository: $DOCKER_IMAGE/frontend|;s|tag:.*|tag: \"$CI_COMMIT_SHA\"|}" helm/environments/dev-values.yaml'
    # admin 섹션
    - 'sed -i "/^admin:/,\${s|repository:.*|repository: $DOCKER_IMAGE/admin|;s|tag:.*|tag: \"$CI_COMMIT_SHA\"|}" helm/environments/dev-values.yaml'
    # imagePullPolicy를 IfNotPresent로 전환 (Registry 이미지 사용 시)
    - 'sed -i "s|imagePullPolicy:.*|imagePullPolicy: IfNotPresent|" helm/environments/dev-values.yaml'
    - git add helm/environments/dev-values.yaml
    - 'git diff --staged --quiet || git commit -m "ci: update image tags to $CI_COMMIT_SHA [skip ci]"'
    - git push
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: on_success
  needs:
    - build-game-server
    - build-ai-adapter
    - build-frontend
    - build-admin
