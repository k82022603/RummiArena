# .gitlab-ci.yml
# RummiArena GitLab CI/CD 파이프라인
# DevSecOps: lint → test → quality → build → update-gitops
#
# 파이프라인 현황: **17/17 ALL GREEN** (Pipeline #96, 2026-04-03)
#   lint(4) + test(2) + quality(2) + build(4 Kaniko + 4 Trivy scan) + update-gitops(1)
#
# Trivy 보안 스캔 (2026-04-04 강화):
#   이미지 스캔: HIGH,CRITICAL 경고 + CRITICAL 게이트 + --ignore-unfixed + JSON 리포트
#   파일시스템 스캔: HIGH,CRITICAL 게이트 + --ignore-unfixed
#   Source map 검사: frontend/admin 이미지에 .map 파일 존재 여부 경고
#
# 빌드 전략: Kaniko (DinD 대체, 2026-04-03~)
#   K8s Executor privileged=false → DinD 불가 → Kaniko userspace 빌드로 전환
#   Kaniko: Docker daemon 없이 Dockerfile 빌드/푸시. 보안 우수, 메모리 효율적.
#   첫 빌드: 캐시 미스로 ~15-25분 (전 레이어 Registry 푸시). 이후 빌드: ~3-5분 (캐시 히트).
#   빌드 직렬화: Phase 1(game-server+ai-adapter) → Phase 2(frontend+admin) — Registry push 대역폭 경쟁 해소
#   해결 이력: Pipeline #94 DinD→Kaniko 전환 → #95 timeout 30m → #96 timeout 45m + 직렬화 → 17/17 GREEN
#
# 교대 실행 전략 (10GB WSL 제약):
#   CI 모드: PG(Sonar) + SonarQube + GitLab Runner ~ 2.5 GB
#   Dev/Deploy 모드와 CI 모드 동시 실행 금지
#
# 필요한 GitLab CI/CD Variables (Settings → CI/CD → Variables):
#   SONAR_HOST_URL       — SonarQube 서버 URL (예: http://host.docker.internal:9001)
#   SONAR_TOKEN          — SonarQube 분석 토큰
#   CI_REGISTRY_USER     — GitLab Container Registry 사용자 (CI_JOB_TOKEN 자동 제공)
#   CI_REGISTRY_PASSWORD — GitLab Container Registry 패스워드 (CI_JOB_TOKEN 자동 제공)
#   GITOPS_TOKEN         — GitHub Personal Access Token (GitOps repo push용)

# =============================================================================
# 전역 설정
# =============================================================================

stages:
  - lint
  - test
  - quality
  - build
  - update-gitops

variables:
  DOCKER_IMAGE: registry.gitlab.com/k82022603/rummiarena
  # DOCKER_DRIVER, DOCKER_TLS_CERTDIR 제거됨 — DinD → Kaniko 전환으로 불필요
  SONAR_PROJECT_KEY: rummiarena
  # =========================================================================
  # PVC 직접 캐시 전략 (/cache → gitlab-runner-cache PVC, 2Gi)
  # GitLab cache 메커니즘(압축/해제) 대신 PVC 파일시스템에 직접 저장.
  # Job Pod마다 /cache가 마운트되어 모든 파이프라인에서 영구 재사용.
  # =========================================================================
  # Go: 모듈 캐시 + 빌드 캐시 → PVC
  GOMODCACHE: "/cache/go/mod"
  GOCACHE: "/cache/go/build"
  GOPATH: "/cache/go/path"
  # Node.js: npm 캐시 → PVC
  npm_config_cache: "/cache/npm"
  # Trivy: DB 캐시 → PVC
  TRIVY_CACHE_DIR: "/cache/trivy"

# 로컬 K8s 런너 강제 실행 앵커
# quality/lint/test는 host.docker.internal 접근이 필요하므로 공유 런너 사용 금지
.local-runner: &local-runner
  tags:
    - k8s
    - rummiarena

# =============================================================================
# Lint Stage — 코드 스타일 및 정적 문법 검사
# =============================================================================

lint-go:
  stage: lint
  <<: *local-runner
  timeout: 20m
  image: golangci/golangci-lint:v2.1
  variables:
    GOFLAGS: "-buildvcs=false"
    GOGC: "50"
  script:
    - cd src/game-server
    - go mod download
    - golangci-lint run ./... --timeout 14m --build-tags="" -j 1
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  interruptible: true

lint-nest:
  stage: lint
  <<: *local-runner
  timeout: 15m
  image: node:22-alpine
  script:
    - cd src/ai-adapter
    - npm ci --prefer-offline
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  interruptible: true

lint-frontend:
  stage: lint
  <<: *local-runner
  timeout: 15m
  image: node:22-alpine
  script:
    - cd src/frontend
    - npm ci --prefer-offline
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  interruptible: true

lint-admin:
  stage: lint
  <<: *local-runner
  timeout: 15m
  image: node:22-alpine
  script:
    - cd src/admin
    - npm ci --prefer-offline
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  interruptible: true

# 게임룰 추적성 매트릭스 ↔ 실제 코드 정합성 검증 (Sprint 6 Day 3 Track 5)
# 매트릭스(`docs/02-design/31-game-rule-traceability.md`)에서 종합=✅로 표기된
# 규칙은 Engine/Engine 테스트/UI/E2E 4단계 셀 모두 ✅ + 참조 파일이 실재해야 PASS.
# 검증 스크립트: scripts/rule-matrix-check.py (소요 < 5초, 외부 의존 0)
# 실패 시: 매트릭스 셀의 backtick 파일 경로를 리네임/이동 이후 갱신했는지 확인.
rule-matrix-check:
  stage: lint
  <<: *local-runner
  timeout: 5m
  image: python:3.11-alpine
  before_script:
    - apk add --no-cache git
  script:
    - python3 scripts/rule-matrix-check.py --verbose
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  interruptible: true

# =============================================================================
# Test Stage — 단위/통합 테스트 + 커버리지 수집
# =============================================================================

test-go:
  stage: test
  <<: *local-runner
  timeout: 20m
  image: golang:1.25-alpine
  variables:
    GOGC: "50"
  before_script:
    - apk add --no-cache gcc musl-dev
  script:
    - cd src/game-server
    # 패키지별 순차 빌드 (첫 실행 OOM 방지, 캐시 있으면 빠름)
    - go build -p 2 ./...
    # 커버리지 프로파일 수집 (병렬도 제한)
    - go test ./... -p 2
        -coverprofile=coverage.out
        -covermode=atomic
        -timeout 120s
    - go tool cover -func=coverage.out
    # XML 변환 (GitLab Coverage 리포트) — 원본 module 경로로 gocover-cobertura 실행
    - GOBIN=/usr/local/bin go install github.com/boumenot/gocover-cobertura@latest
    - gocover-cobertura < coverage.out > coverage.xml
    # SonarQube용 경로 변환: module 경로 → 프로젝트 상대 경로 (별도 파일로 유지)
    - sed "s|github.com/k82022603/RummiArena/game-server/|src/game-server/|g" coverage.out > coverage_sonar.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: src/game-server/coverage.xml
    paths:
      - src/game-server/coverage.out
      - src/game-server/coverage_sonar.out
      - src/game-server/coverage.xml
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-nest:
  stage: test
  <<: *local-runner
  timeout: 10m
  image: node:22-alpine
  script:
    - cd src/ai-adapter
    - npm ci --prefer-offline
    # Jest 기본 reporters(json,text,lcov,clover)에 cobertura 추가 — GitLab Coverage 리포트용
    - npx jest --coverage --coverageReporters=text --coverageReporters=lcov --coverageReporters=cobertura
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: src/ai-adapter/coverage/cobertura-coverage.xml
    paths:
      - src/ai-adapter/coverage/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# =============================================================================
# Quality Stage — 보안 게이트 (DevSecOps)
# sonarqube + trivy-fs 는 병렬 실행
# =============================================================================

sonarqube:
  stage: quality
  <<: *local-runner
  timeout: 20m
  image: sonarsource/sonar-scanner-cli:5.0
  variables:
    SONAR_HOST_URL: $SONAR_HOST_URL   # GitLab CI Variable로 주입
    SONAR_TOKEN: $SONAR_TOKEN         # GitLab CI Variable로 주입
    # SonarQube Scanner JVM 메모리 최소화 (CI 모드 10GB 제약)
    # -client: 서버 모드 대비 예약 메모리 절감 (~30% 감소)
    # -Xmx384m: 512m → 384m 축소 (소스 3개 프로젝트 분석에 충분)
    # -XX:+UseSerialGC: GC 스레드 1개로 메모리 오버헤드 최소화
    # -XX:MaxMetaspaceSize: 메타스페이스 무제한 증가 방지
    SONAR_SCANNER_OPTS: "-Xmx384m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m"
    # Scanner 내부 Node.js 분석 프로세스 메모리 제한
    NODE_OPTIONS: "--max-old-space-size=256"
  script:
    # SonarQube 서버 상태 확인 (서버 미기동 시 조기 실패)
    - |
      echo "Waiting for SonarQube server..."
      for i in $(seq 1 12); do
        STATUS=$(wget -qO- "$SONAR_HOST_URL/api/system/status" 2>/dev/null | grep -o '"status":"[^"]*"' | cut -d'"' -f4 || true)
        if [ "$STATUS" = "UP" ]; then
          echo "SonarQube is UP"
          break
        fi
        echo "  Attempt $i/12: status=$STATUS, retrying in 10s..."
        sleep 10
      done
      if [ "$STATUS" != "UP" ]; then
        echo "ERROR: SonarQube server not available at $SONAR_HOST_URL"
        exit 1
      fi
    - sonar-scanner
        -Dsonar.projectKey=$SONAR_PROJECT_KEY
        -Dsonar.projectName="RummiArena"
        -Dsonar.host.url=$SONAR_HOST_URL
        -Dsonar.token=$SONAR_TOKEN
        -Dsonar.qualitygate.wait=true
        -Dsonar.qualitygate.timeout=300
        -Dsonar.sources=src/
        -Dsonar.exclusions="**/node_modules/**,**/*.test.go,**/*.spec.ts,**/*.spec.js,**/dist/**,**/coverage/**,**/playwright-report/**,**/test-results/**,src/frontend/**,src/admin/**"
        -Dsonar.coverage.exclusions="src/frontend/**,src/admin/**"
        -Dsonar.go.coverage.reportPaths=src/game-server/coverage_sonar.out
        -Dsonar.javascript.lcov.reportPaths=src/ai-adapter/coverage/lcov.info
  needs:
    - test-go
    - test-nest
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

trivy-fs:
  stage: quality
  <<: *local-runner
  timeout: 10m
  image:
    name: aquasec/trivy:0.58.2
    entrypoint: [""]
  script:
    # 파일시스템 취약점 스캔 (HIGH/CRITICAL 발견 시 파이프라인 실패)
    # --ignore-unfixed: 패치 없는 취약점 무시 (액션 가능한 것만 표시)
    - trivy fs
        --exit-code 1
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --no-progress
        --format table
        --cache-dir "$TRIVY_CACHE_DIR"
        --skip-dirs "src/ai-adapter/node_modules,src/frontend/node_modules,src/admin/node_modules,.cache"
        src/
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  interruptible: true

# =============================================================================
# Build Stage — Kaniko 빌드 + Trivy 이미지 스캔
# =============================================================================
#
# DinD → Kaniko 전환 이유:
#   GitLab Runner K8s Executor는 privileged=false (보안 정책).
#   DinD(docker:dind)는 dockerd 실행에 privileged 필수 → TCP 연결 실패.
#   Kaniko는 userspace에서 이미지를 빌드하므로 privileged 불필요.
#   추가 이점: 서비스 컨테이너 불필요, 메모리 효율적 (~300MB vs DinD ~512MB+).
#
# 인증 방식:
#   Kaniko는 /kaniko/.docker/config.json 에서 레지스트리 인증 정보를 읽는다.
#   GitLab CI가 제공하는 CI_REGISTRY_USER + CI_REGISTRY_PASSWORD 로 생성.
#
# 캐시 전략:
#   --cache=true + --cache-repo: 레이어 캐시를 Registry에 저장/재사용.
#   첫 빌드는 캐시 미스로 느리지만, 이후 빌드는 변경 레이어만 재빌드.

.build-kaniko: &build-kaniko
  stage: build
  <<: *local-runner
  # 첫 빌드(캐시 미스): ~15-25분 (레이어 빌드+Registry 푸시), 이후: ~3-5분 (캐시 히트)
  # Next.js 앱(frontend/admin)은 node_modules 레이어가 대용량이라 Registry push에 시간 소요
  timeout: 45m
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    # Kaniko 컨텍스트 기본 경로 (CI_PROJECT_DIR은 GitLab이 자동 설정)
    KANIKO_CACHE_REPO: "${DOCKER_IMAGE}/cache"
  before_script:
    # Kaniko 레지스트리 인증 설정
    # CI_REGISTRY=registry.gitlab.com, CI_REGISTRY_USER/PASSWORD는 GitLab이 자동 제공
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf '%s' "${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD}" | base64)\"}}}" > /kaniko/.docker/config.json
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Trivy 이미지 스캔 공통 템플릿
# Kaniko 빌드 후 Registry에서 직접 풀링하여 스캔 (Docker 소켓 불필요)
# Trivy는 TRIVY_USERNAME + TRIVY_PASSWORD 환경변수로 레지스트리 인증
#
# 스캔 전략 (2026-04-04 강화):
#   Pass 1: HIGH,CRITICAL → exit-code 0 (경고만, 파이프라인 중단 안 함) + JSON 리포트 저장
#   Pass 2: CRITICAL → exit-code 1 (파이프라인 실패)
#   --ignore-unfixed: 패치 없는 취약점 무시 (노이즈 감소)
.trivy-scan: &trivy-scan
  stage: build
  <<: *local-runner
  timeout: 10m
  image:
    name: aquasec/trivy:0.58.2
    entrypoint: [""]
  variables:
    TRIVY_CACHE_DIR: "/cache/trivy"
    TRIVY_USERNAME: "${CI_REGISTRY_USER}"
    TRIVY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build-game-server:
  <<: *build-kaniko
  script:
    - /kaniko/executor
        --context "${CI_PROJECT_DIR}/src/game-server"
        --dockerfile "${CI_PROJECT_DIR}/src/game-server/Dockerfile"
        --destination "${DOCKER_IMAGE}/game-server:${CI_COMMIT_SHA}"
        --destination "${DOCKER_IMAGE}/game-server:latest"
        --target runner
        --cache=true
        --cache-repo "${KANIKO_CACHE_REPO}"
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}"
        --label "org.opencontainers.image.ref.name=${CI_COMMIT_REF_NAME}"
        --snapshot-mode=redo
        --compressed-caching=false
        --push-retry=3

scan-game-server:
  <<: *trivy-scan
  needs: ["build-game-server"]
  script:
    # Pass 1: HIGH+CRITICAL 경고 리포트 (파이프라인 중단 안 함)
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --no-progress
        --format table
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/game-server:${CI_COMMIT_SHA}"
    # Pass 1b: JSON 리포트 저장 (대시보드/추적용)
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --no-progress
        --format json
        --output trivy-game-server.json
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/game-server:${CI_COMMIT_SHA}"
    # Pass 2: CRITICAL만 파이프라인 실패 게이트
    - trivy image
        --exit-code 1
        --severity CRITICAL
        --ignore-unfixed
        --no-progress
        --format table
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/game-server:${CI_COMMIT_SHA}"
  artifacts:
    paths:
      - trivy-game-server.json
    expire_in: 30 days
    when: always

build-ai-adapter:
  <<: *build-kaniko
  script:
    - /kaniko/executor
        --context "${CI_PROJECT_DIR}/src/ai-adapter"
        --dockerfile "${CI_PROJECT_DIR}/src/ai-adapter/Dockerfile"
        --destination "${DOCKER_IMAGE}/ai-adapter:${CI_COMMIT_SHA}"
        --destination "${DOCKER_IMAGE}/ai-adapter:latest"
        --target runner
        --cache=true
        --cache-repo "${KANIKO_CACHE_REPO}"
        --snapshot-mode=redo
        --compressed-caching=false
        --push-retry=3

scan-ai-adapter:
  <<: *trivy-scan
  needs: ["build-ai-adapter"]
  script:
    # Pass 1: HIGH+CRITICAL 경고 리포트
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --no-progress
        --format table
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/ai-adapter:${CI_COMMIT_SHA}"
    # Pass 1b: JSON 리포트 저장
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --no-progress
        --format json
        --output trivy-ai-adapter.json
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/ai-adapter:${CI_COMMIT_SHA}"
    # Pass 2: CRITICAL만 파이프라인 실패 게이트
    - trivy image
        --exit-code 1
        --severity CRITICAL
        --ignore-unfixed
        --no-progress
        --format table
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/ai-adapter:${CI_COMMIT_SHA}"
  artifacts:
    paths:
      - trivy-ai-adapter.json
    expire_in: 30 days
    when: always

build-frontend:
  <<: *build-kaniko
  # Phase 2: game-server 빌드 완료 후 실행 — Registry push 대역폭 경쟁 해소
  needs: ["build-game-server"]
  script:
    - /kaniko/executor
        --context "${CI_PROJECT_DIR}/src/frontend"
        --dockerfile "${CI_PROJECT_DIR}/src/frontend/Dockerfile"
        --destination "${DOCKER_IMAGE}/frontend:${CI_COMMIT_SHA}"
        --destination "${DOCKER_IMAGE}/frontend:latest"
        --target runner
        --cache=true
        --cache-repo "${KANIKO_CACHE_REPO}"
        --snapshot-mode=redo
        --compressed-caching=false
        --push-retry=3

scan-frontend:
  <<: *trivy-scan
  needs: ["build-frontend"]
  script:
    # Pass 1: HIGH+CRITICAL 경고 리포트
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --no-progress
        --format table
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/frontend:${CI_COMMIT_SHA}"
    # Pass 1b: JSON 리포트 저장
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --no-progress
        --format json
        --output trivy-frontend.json
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/frontend:${CI_COMMIT_SHA}"
    # Source map 검사: 프로덕션 이미지에 .map 파일 존재 여부 확인 (정보 유출 방지)
    # crane export로 이미지 파일시스템을 tar 스트림으로 받아 .map 파일 탐색
    # crane은 Docker 없이 Registry에서 직접 이미지 레이어를 다운로드
    - |
      echo "=== Source Map Detection (frontend) ==="
      apk add --no-cache crane 2>/dev/null || (
        wget -qO /tmp/crane.tar.gz "https://github.com/google/go-containerregistry/releases/download/v0.20.3/go-containerregistry_Linux_x86_64.tar.gz" &&
        tar -xzf /tmp/crane.tar.gz -C /usr/local/bin crane
      )
      crane auth login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" 2>/dev/null || true
      MAP_COUNT=$(crane export "${DOCKER_IMAGE}/frontend:${CI_COMMIT_SHA}" - 2>/dev/null | tar tf - 2>/dev/null | grep '\.map$' | grep '^app/' | wc -l || echo "0")
      if [ "$MAP_COUNT" -gt 0 ]; then
        echo "WARNING: $MAP_COUNT .map source map file(s) found in frontend production image (app/ only)!"
        echo "  Consider adding 'RUN find /app -name \"*.map\" -delete' to Dockerfile runner stage"
        crane export "${DOCKER_IMAGE}/frontend:${CI_COMMIT_SHA}" - 2>/dev/null | tar tf - 2>/dev/null | grep '\.map$' | grep '^app/' | head -10
      else
        echo "OK: No .map source map files detected in frontend image"
      fi
    # Pass 2: CRITICAL만 파이프라인 실패 게이트
    - trivy image
        --exit-code 1
        --severity CRITICAL
        --ignore-unfixed
        --no-progress
        --format table
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/frontend:${CI_COMMIT_SHA}"
  artifacts:
    paths:
      - trivy-frontend.json
    expire_in: 30 days
    when: always

build-admin:
  <<: *build-kaniko
  # Phase 2: ai-adapter 빌드 완료 후 실행 — Registry push 대역폭 경쟁 해소
  needs: ["build-ai-adapter"]
  script:
    - /kaniko/executor
        --context "${CI_PROJECT_DIR}/src/admin"
        --dockerfile "${CI_PROJECT_DIR}/src/admin/Dockerfile"
        --destination "${DOCKER_IMAGE}/admin:${CI_COMMIT_SHA}"
        --destination "${DOCKER_IMAGE}/admin:latest"
        --target runner
        --cache=true
        --cache-repo "${KANIKO_CACHE_REPO}"
        --snapshot-mode=redo
        --compressed-caching=false
        --push-retry=3

scan-admin:
  <<: *trivy-scan
  needs: ["build-admin"]
  script:
    # Pass 1: HIGH+CRITICAL 경고 리포트
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --no-progress
        --format table
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/admin:${CI_COMMIT_SHA}"
    # Pass 1b: JSON 리포트 저장
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --no-progress
        --format json
        --output trivy-admin.json
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/admin:${CI_COMMIT_SHA}"
    # Source map 검사: 프로덕션 이미지에 .map 파일 존재 여부 확인 (정보 유출 방지)
    - |
      echo "=== Source Map Detection (admin) ==="
      apk add --no-cache crane 2>/dev/null || (
        wget -qO /tmp/crane.tar.gz "https://github.com/google/go-containerregistry/releases/download/v0.20.3/go-containerregistry_Linux_x86_64.tar.gz" &&
        tar -xzf /tmp/crane.tar.gz -C /usr/local/bin crane
      )
      crane auth login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" 2>/dev/null || true
      MAP_COUNT=$(crane export "${DOCKER_IMAGE}/admin:${CI_COMMIT_SHA}" - 2>/dev/null | tar tf - 2>/dev/null | grep '\.map$' | grep '^app/' | wc -l || echo "0")
      if [ "$MAP_COUNT" -gt 0 ]; then
        echo "WARNING: $MAP_COUNT .map source map file(s) found in admin production image (app/ only)!"
        echo "  Consider adding 'RUN find /app -name \"*.map\" -delete' to Dockerfile runner stage"
        crane export "${DOCKER_IMAGE}/admin:${CI_COMMIT_SHA}" - 2>/dev/null | tar tf - 2>/dev/null | grep '\.map$' | grep '^app/' | head -10
      else
        echo "OK: No .map source map files detected in admin image"
      fi
    # Pass 2: CRITICAL만 파이프라인 실패 게이트
    - trivy image
        --exit-code 1
        --severity CRITICAL
        --ignore-unfixed
        --no-progress
        --format table
        --cache-dir "$TRIVY_CACHE_DIR"
        "${DOCKER_IMAGE}/admin:${CI_COMMIT_SHA}"
  artifacts:
    paths:
      - trivy-admin.json
    expire_in: 30 days
    when: always

# =============================================================================
# Update GitOps Stage — ArgoCD가 감시하는 dev-values.yaml 이미지 태그 업데이트
# =============================================================================

update-gitops:
  stage: update-gitops
  <<: *local-runner
  timeout: 5m
  image:
    name: alpine/git:latest
    entrypoint: [""]
  before_script:
    - git config --global user.email "ci@rummiarena.local"
    - git config --global user.name "GitLab CI Bot"
  script:
    - git clone https://oauth2:$GITOPS_TOKEN@github.com/k82022603/RummiArena.git gitops
    - cd gitops
    # dev-values.yaml 구조: repository + tag 분리 (Helm 표준)
    # repository를 GitLab Registry 경로로 교체하고 tag를 커밋 SHA로 업데이트
    # gameServer 섹션
    - 'sed -i "/gameServer:/,/aiAdapter:/{s|repository:.*|repository: $DOCKER_IMAGE/game-server|;s|tag:.*|tag: \"$CI_COMMIT_SHA\"|}" helm/environments/dev-values.yaml'
    # aiAdapter 섹션
    - 'sed -i "/aiAdapter:/,/frontend:/{s|repository:.*|repository: $DOCKER_IMAGE/ai-adapter|;s|tag:.*|tag: \"$CI_COMMIT_SHA\"|}" helm/environments/dev-values.yaml'
    # frontend 섹션
    - 'sed -i "/^frontend:/,/^admin:/{s|repository:.*|repository: $DOCKER_IMAGE/frontend|;s|tag:.*|tag: \"$CI_COMMIT_SHA\"|}" helm/environments/dev-values.yaml'
    # admin 섹션
    - 'sed -i "/^admin:/,\${s|repository:.*|repository: $DOCKER_IMAGE/admin|;s|tag:.*|tag: \"$CI_COMMIT_SHA\"|}" helm/environments/dev-values.yaml'
    # imagePullPolicy를 IfNotPresent로 전환 (Registry 이미지 사용 시)
    - 'sed -i "s|imagePullPolicy:.*|imagePullPolicy: IfNotPresent|" helm/environments/dev-values.yaml'
    - git add helm/environments/dev-values.yaml
    - 'git diff --staged --quiet || git commit -m "ci: update image tags to $CI_COMMIT_SHA [skip ci]"'
    - git push
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: on_success
  needs:
    - build-game-server
    - scan-game-server
    - build-ai-adapter
    - scan-ai-adapter
    - build-frontend
    - scan-frontend
    - build-admin
    - scan-admin
