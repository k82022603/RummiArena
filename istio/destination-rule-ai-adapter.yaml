# Istio DestinationRule -- ai-adapter 서킷 브레이커 + 연결 풀
# game-server -> ai-adapter 구간에 적용
# 설계 근거: docs/02-design/20-istio-selective-mesh-design.md Section 4.5
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: ai-adapter
  namespace: rummikub
spec:
  host: ai-adapter.rummikub.svc.cluster.local
  trafficPolicy:
    connectionPool:
      http:
        h2UpgradePolicy: UPGRADE
        maxRequestsPerConnection: 10
        http1MaxPendingRequests: 20
      tcp:
        maxConnections: 50
        connectTimeout: 10s
    outlierDetection:
      # 연속 5xx 에러 3회 시 서킷 오픈
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      # Pod 1개이므로 100% (전체 차단 후 복구 대기)
      maxEjectionPercent: 100
    tls:
      mode: ISTIO_MUTUAL
