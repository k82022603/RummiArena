# sonar-project.properties
# SonarQube 프로젝트 설정 (sonar-scanner CLI가 이 파일을 자동으로 읽음)
# CI 파이프라인에서는 .gitlab-ci.yml의 -D 옵션이 이 파일보다 우선함
#
# 로컬 스캔 실행 방법:
#   docker run --rm \
#     -e SONAR_HOST_URL=http://localhost:9000 \
#     -e SONAR_TOKEN=<token> \
#     -v "$(pwd):/usr/src" \
#     sonarsource/sonar-scanner-cli

# 프로젝트 식별
sonar.projectKey=rummiarena
sonar.projectName=RummiArena
sonar.projectVersion=0.1.0

# 소스 루트 (프로젝트 루트 기준 상대 경로)
sonar.sources=src

# 제외 패턴
sonar.exclusions=\
  **/node_modules/**,\
  **/*.test.go,\
  **/*.spec.ts,\
  **/*.spec.js,\
  **/dist/**,\
  **/coverage/**,\
  **/build/**,\
  **/.next/**,\
  **/out/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  src/frontend/**,\
  src/admin/**

# 테스트 파일 패턴
sonar.tests=src
sonar.test.inclusions=\
  **/*_test.go,\
  **/*.spec.ts,\
  **/*.spec.js,\
  **/*.test.ts,\
  **/*.test.js

# 커버리지 리포트 (CI에서 test 스테이지 artifacts 활용)
sonar.go.coverage.reportPaths=src/game-server/coverage.out
sonar.javascript.lcov.reportPaths=\
  src/ai-adapter/coverage/lcov.info,\
  src/frontend/coverage/lcov.info

# 언어별 소스 인코딩
sonar.sourceEncoding=UTF-8

# 중복 코드 분석 (작은 프로젝트이므로 최소화)
sonar.cpd.exclusions=\
  **/node_modules/**,\
  **/*.spec.ts,\
  **/*.test.go

# Quality Gate 대기 (파이프라인이 결과를 기다림)
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
